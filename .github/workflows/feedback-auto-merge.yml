# Auto-merge PRs opened by the Slack/Telegram feedback → Cursor SDK pipeline.
# Targets the repo default branch when the head branch matches feedback naming.
name: Feedback PR auto-merge

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: |
      (
        startsWith(github.head_ref, 'feat/feedback-') ||
        startsWith(github.head_ref, 'cursor/feedback-')
      ) &&
      github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Squash-merge feedback PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge "$PR_NUMBER" --squash --delete-branch
