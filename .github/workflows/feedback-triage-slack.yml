# Daily Slack feedback → Cursor cloud agent → GitHub PRs.
# Add repo Secrets: CURSOR_API_KEY, SLACK_BOT_TOKEN, SLACK_FEEDBACK_CHANNEL_ID
# Optional: SLACK_ALLOWLIST_USER_IDS, FEEDBACK_REPO_URL, FEEDBACK_MODEL,
#           FEEDBACK_MAX_MESSAGES_PER_RUN, FEEDBACK_MAX_PRS_PER_RUN
name: Feedback triage (Slack)

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch: {}

jobs:
  triage-slack:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Slack feedback triage
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_FEEDBACK_CHANNEL_ID: ${{ secrets.SLACK_FEEDBACK_CHANNEL_ID }}
          SLACK_ALLOWLIST_USER_IDS: ${{ secrets.SLACK_ALLOWLIST_USER_IDS }}
          FEEDBACK_REPO_URL: ${{ secrets.FEEDBACK_REPO_URL }}
          FEEDBACK_MODEL: ${{ secrets.FEEDBACK_MODEL }}
          FEEDBACK_MAX_MESSAGES_PER_RUN: ${{ secrets.FEEDBACK_MAX_MESSAGES_PER_RUN }}
          FEEDBACK_MAX_PRS_PER_RUN: ${{ secrets.FEEDBACK_MAX_PRS_PER_RUN }}
        run: npm run feedback:triage-slack
